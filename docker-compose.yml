version: "3.8"

services:
  # ===== 区块链节点 =====
  ganache:
    image: trufflesuite/ganache:latest
    container_name: educhain-ganache
    ports:
      - "8545:8545"
    command:
      - "--host=0.0.0.0"
      - "--port=8545"
      - "--accounts=10"
      - "--defaultBalanceEther=1000"
      - "--gasLimit=8000000"
      - "--chain.chainId=1337"
      - "--miner.blockGasLimit=8000000"
      - "--database.dbPath=/ganache_data"
      - "--wallet.mnemonic=test test test test test test test test test test test junk"
    volumes:
      - ganache_data:/ganache_data
    networks:
      - educhain-net

  # ===== 后端 =====
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: educhain-backend
    ports:
      - "5000:5000"
    environment:
      - GANACHE_URL=http://ganache:8545
      - CHAIN_ID=1337
      - FLASK_DEBUG=1
    volumes:
      - ./backend:/app
      - ./scripts:/app/scripts:ro
      - upload_data:/app/uploads
    depends_on:
      - ganache
    networks:
      - educhain-net

  # ===== 前端（Vue + Nginx） =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: educhain-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - educhain-net

volumes:
  ganache_data:
  upload_data:

networks:
  educhain-net:
    driver: bridge